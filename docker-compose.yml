services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: crud_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: crud_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: true
    depends_on:
      - backend
